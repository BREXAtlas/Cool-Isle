name: Deploy CoolIsle to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Mirror WeatherChart's already-published JSON after its standalone update.
    # This workflow never receives or calls the Met Office API key.
    - cron: '47 * * * *'

permissions: {}

concurrency:
  group: coolisle-pages
  cancel-in-progress: false

jobs:
  prepare:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Mirror the standalone WeatherChart public data
        env:
          WEATHERCHART_DEPLOYED_DATA_BASE: https://brexatlas.github.io/WeatherChartUK/data/
        run: node scripts/restore-deployed-data.mjs

      - name: Verify site and live-data shape
        run: |
          npm test
          npm run test:html
          npm run test:static
          node scripts/validate-generated-data.mjs --require-live-forecast

      - name: Stage the public Pages artifact
        run: |
          mkdir -p "$RUNNER_TEMP/pages-site"
          rsync -a \
            --exclude='.git/' \
            --exclude='.weatherchart-state/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            ./ "$RUNNER_TEMP/pages-site/"

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/pages-site

  deploy:
    needs: prepare
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
